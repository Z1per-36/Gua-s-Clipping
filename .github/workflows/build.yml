name: Build and Release Executables

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --clean --name "NewsClippingTool_${{ matrix.os }}" --collect-all customtkinter --collect-all plyer main.py

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/NewsClippingTool_${{ matrix.os }}.exe
          dist/NewsClippingTool_${{ matrix.os }}
